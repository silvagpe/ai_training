<div class="max-w-4xl mx-auto p-6">
  <div class="bg-slate-900/60 border border-slate-800 rounded-2xl p-8 shadow-xl">
    <h2 class="text-3xl font-bold text-slate-100 mb-6">Portfolio Analysis</h2>
    <p class="text-slate-400 mb-8">Enter your portfolio details below to receive a comprehensive analysis and investment recommendations.</p>
    
    <form [formGroup]="portfolioForm" (ngSubmit)="onSubmit()" class="space-y-6">
      <!-- Client ID -->
      <div>
        <label for="client_id" class="block text-sm font-medium text-slate-300 mb-2">
          Client ID (Optional)
        </label>
        <input
          id="client_id"
          type="text"
          formControlName="client_id"
          placeholder="e.g., client_001"
          class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-lg text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
        />
      </div>

      <!-- Total Patrimony -->
      <div>
        <label for="total_patrimony_brl" class="block text-sm font-medium text-slate-300 mb-2">
          Total Patrimony (BRL) <span class="text-rose-400">*</span>
        </label>
        <input
          id="total_patrimony_brl"
          type="number"
          formControlName="total_patrimony_brl"
          placeholder="e.g., 100000"
          min="1"
          step="0.01"
          class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-lg text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
          [class.border-rose-500]="portfolioForm.get('total_patrimony_brl')?.invalid && portfolioForm.get('total_patrimony_brl')?.touched"
        />
        <p *ngIf="portfolioForm.get('total_patrimony_brl')?.invalid && portfolioForm.get('total_patrimony_brl')?.touched" 
           class="mt-1 text-sm text-rose-400">
          Please enter a valid amount greater than 0
        </p>
      </div>

      <!-- Monthly Contribution -->
      <div>
        <label for="monthly_contribution_brl" class="block text-sm font-medium text-slate-300 mb-2">
          Monthly Contribution (BRL)
        </label>
        <input
          id="monthly_contribution_brl"
          type="number"
          formControlName="monthly_contribution_brl"
          placeholder="e.g., 1000"
          min="0"
          step="0.01"
          class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-lg text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
        />
      </div>

      <!-- Investment Horizon -->
      <div>
        <label for="investment_horizon_months" class="block text-sm font-medium text-slate-300 mb-2">
          Investment Horizon (Months)
        </label>
        <input
          id="investment_horizon_months"
          type="number"
          formControlName="investment_horizon_months"
          placeholder="e.g., 60"
          min="1"
          class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-lg text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition"
        />
      </div>

      <!-- Current Assets -->
      <div class="border-t border-slate-800 pt-6">
        <div class="flex justify-between items-center mb-4">
          <h3 class="text-xl font-semibold text-slate-100">Current Assets</h3>
          <button
            type="button"
            (click)="addAsset()"
            class="px-4 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium rounded-lg transition"
          >
            + Add Asset
          </button>
        </div>

        <div formArrayName="current_assets" class="space-y-4">
          <div *ngFor="let asset of currentAssets.controls; let i = index" 
               [formGroupName]="i"
               class="bg-slate-950/50 border border-slate-800 rounded-lg p-4">
            <div class="flex justify-between items-start mb-3">
              <span class="text-sm font-medium text-slate-400">Asset {{ i + 1 }}</span>
              <button
                type="button"
                (click)="removeAsset(i)"
                [disabled]="currentAssets.length === 1"
                class="text-rose-400 hover:text-rose-300 text-sm font-medium disabled:opacity-30 disabled:cursor-not-allowed transition"
              >
                Remove
              </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
              <!-- Ticker -->
              <div>
                <label [attr.for]="'ticker_' + i" class="block text-xs font-medium text-slate-400 mb-1">
                  Ticker <span class="text-rose-400">*</span>
                </label>
                <input
                  [id]="'ticker_' + i"
                  type="text"
                  formControlName="ticker"
                  placeholder="e.g., KNCR11"
                  class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 text-sm transition"
                  [class.border-rose-500]="asset.get('ticker')?.invalid && asset.get('ticker')?.touched"
                />
              </div>

              <!-- Quantity -->
              <div>
                <label [attr.for]="'quantity_' + i" class="block text-xs font-medium text-slate-400 mb-1">
                  Quantity <span class="text-rose-400">*</span>
                </label>
                <input
                  [id]="'quantity_' + i"
                  type="number"
                  formControlName="quantity"
                  placeholder="e.g., 10"
                  min="0.01"
                  step="0.01"
                  class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 text-sm transition"
                  [class.border-rose-500]="asset.get('quantity')?.invalid && asset.get('quantity')?.touched"
                />
              </div>

              <!-- Current Price -->
              <div>
                <label [attr.for]="'current_price_' + i" class="block text-xs font-medium text-slate-400 mb-1">
                  Current Price (BRL) <span class="text-rose-400">*</span>
                </label>
                <input
                  [id]="'current_price_' + i"
                  type="number"
                  formControlName="current_price"
                  placeholder="e.g., 9.66"
                  min="0.01"
                  step="0.01"
                  class="w-full px-3 py-2 bg-slate-900 border border-slate-700 rounded text-slate-200 placeholder-slate-500 focus:outline-none focus:border-indigo-500 text-sm transition"
                  [class.border-rose-500]="asset.get('current_price')?.invalid && asset.get('current_price')?.touched"
                />
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="flex justify-end pt-4">
        <button
          type="submit"
          [disabled]="!portfolioForm.valid"
          class="px-8 py-3 bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-700 disabled:cursor-not-allowed text-white font-semibold rounded-lg transition shadow-lg hover:shadow-indigo-500/50"
        >
          Analyze Portfolio
        </button>
      </div>
    </form>
  </div>
</div>
